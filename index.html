<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>週間アルコール管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161920;
            --accent: #e8c84a;
            --safe: #4ae8a0;
            --danger: #e84a4a;
            --text: #e8eaf0;
            --muted: #6b718a;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Zen Kaku Gothic New', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 5px;
        }
        .limit-info {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .gauge-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .total-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            line-height: 1;
        }
        .unit { font-size: 1rem; color: var(--muted); }
        .progress-bar {
            height: 12px;
            background: #2a2f3e;
            border-radius: 6px;
            margin: 15px 0;
            overflow: hidden;
        }
        #bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--safe), var(--accent));
            transition: width 0.5s ease;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #1e222e;
            border: 1px solid #2a2f3e;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: var(--accent);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .history {
            border-top: 1px solid #2a2f3e;
            padding-top: 15px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ALCOHOL TRACKER</h1>
        <p class="limit-info">週の上限: 140g (1日平均20g)</p>
        
        <div class="gauge-area">
            <div class="total-val" id="total-display">0<span class="unit">g</span></div>
            <div class="progress-bar">
                <div id="bar-fill"></div>
            </div>
            <p id="status-msg" style="font-size: 0.9rem; color: var(--safe);">今週はあと 140g 飲めます</p>
        </div>

        <div class="input-group">
            <input type="number" id="amount" placeholder="今日の摂取量 (g)" inputmode="decimal">
            <button onclick="addEntry()">記録</button>
        </div>

        <div class="history" id="history-list">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">最近の記録</p>
        </div>
        <button onclick="resetData()" style="background: transparent; color: var(--danger); font-size: 0.7rem; margin-top: 20px; width: 100%;">データをリセット</button>
    </div>

    <script>
        let total = parseFloat(localStorage.getItem('alc_total')) || 0;
        const limit = 140;

        function updateDisplay() {
            document.getElementById('total-display').childNodes[0].nodeValue = total.toFixed(1);
            const percent = Math.min((total / limit) * 100, 100);
            document.getElementById('bar-fill').style.width = percent + '%';
            
            const remaining = limit - total;
            const msg = document.getElementById('status-msg');
            if (remaining >= 0) {
                msg.innerText = `今週はあと ${remaining.toFixed(1)}g 飲めます`;
                msg.style.color = 'var(--safe)';
            } else {
                msg.innerText = `上限を ${Math.abs(remaining).toFixed(1)}g 超えています`;
                msg.style.color = 'var(--danger)';
            }
            localStorage.setItem('alc_total', total);
        }

        function addEntry() {
            const val = parseFloat(document.getElementById('amount').value);
            if (!isNaN(val)) {
                total += val;
                updateDisplay();
                document.getElementById('amount').value = '';
                
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<span>${new Date().toLocaleDateString()}</span><span>${val}g</span>`;
                document.getElementById('history-list').appendChild(item);
            }
        }

        function resetData() {
            if(confirm('記録をすべてリセットしますか？')) {
                total = 0;
                localStorage.removeItem('alc_total');
                location.reload();
            }
        }

        updateDisplay();
    </script>
</body>
</html>
