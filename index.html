<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週間アルコール管理</title>
<link rel="manifest" href="manifest.json">  
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png" type="image/png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e222e; --border: #2a2f3e;
    --accent: #e8c84a; --accent2: #e87a4a; --safe: #4ae8a0; --danger: #e84a4a;
    --text: #e8eaf0; --muted: #6b718a; --max: 140;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px;
  }
  header { width: 100%; max-width: 420px; margin-bottom: 28px; text-align: center; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: .12em; color: var(--accent); line-height: 1; }
  header p { font-size: .78rem; color: var(--muted); margin-top: 4px; letter-spacing: .05em; }
  .week-label { display: inline-block; margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 14px; font-size: .78rem; color: var(--muted); }

  .gauge-wrap { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px 20px; margin-bottom: 20px; }
  .gauge-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
  .gauge-header .label { font-size: .75rem; color: var(--muted); }
  .gauge-header .total-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; }
  .gauge-header .total-val span { font-size: .9rem; color: var(--muted); margin-left: 3px; }
  .bar-track { height: 18px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--safe), var(--accent)); transition: width .6s ease; }
  .bar-fill.warning { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .bar-fill.over { background: linear-gradient(90deg, var(--accent2), var(--danger)); }
  .remaining-badge { margin-top: 16px; background: var(--surface2); border-radius: 10px; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
  .remaining-badge .r-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--safe); }
  .remaining-badge .r-val.warning { color: var(--accent); }
  .remaining-badge .r-val.over { color: var(--danger); }

  .kyukan-wrap { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
  .kyukan-wrap h2 { font-size: .8rem; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px; }
  .cal-day { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cal-day .dow { font-size: .65rem; color: var(--muted); }
  .cal-day .dow.sun { color: #e87a7a; }
  .cal-day .dow.sat { color: #7ab4e8; }
  .day-btn { width: 100%; aspect-ratio: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
  .day-btn.today { border-color: var(--accent); color: var(--accent); }
  .day-btn.future { opacity: .35; pointer-events: none; }
  .day-btn.kyukan { background: rgba(74,232,160,.15); border-color: var(--safe); color: var(--safe); }
  .day-btn.kyukan::after { content: '🌙'; position: absolute; bottom: 1px; right: 2px; font-size: .55rem; }

  .card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
  .card h2 { font-size: .8rem; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: .72rem; color: var(--muted); }
  .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; padding: 10px; width: 100%; outline: none; }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .preset-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .72rem; padding: 5px 10px; cursor: pointer; }
  .calc-result { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: .78rem; color: var(--muted); margin-bottom: 14px; }
  .calc-result .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); }
  .btn-add { width: 100%; background: var(--accent); border: none; border-radius: 10px; color: #0d0f14; font-size: 1rem; font-weight: 700; padding: 13px; cursor: pointer; }
  
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .hist-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .hist-g { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--accent2); }
  .hist-del { background: none; border: none; color: var(--muted); cursor: pointer; margin-left: 10px; }

  .matrix-wrap { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
  .matrix-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .matrix-table th, .matrix-table td { border: 1px solid var(--border); padding: 9px; text-align: center; }
  .matrix-table td.drink-label { text-align: left; background: var(--surface2); }

  .btn-reset { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: .8rem; padding: 9px 24px; cursor: pointer; width: 100%; max-width: 420px; margin-top: 8px; }
  .banner { width: 100%; max-width: 420px; background: rgba(232,74,74,.12); border: 1px solid var(--danger); border-radius: 10px; padding: 12px; color: var(--danger); text-align: center; margin-bottom: 16px; display: none; }
  .banner.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>ALCOHOL TRACKER</h1>
  <p>7日間 純アルコール量管理 / MAX 140g</p>
  <span class="week-label" id="weekLabel"></span>
</header>

<div class="banner" id="banner">⚠️ 期間上限 140g を超えています！</div>

<div class="gauge-wrap">
  <div class="gauge-header">
    <div class="label">現在の摂取量</div>
    <div class="total-val" id="totalVal">0<span>g</span></div>
  </div>
  <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="remaining-badge">
    <span class="r-label">あと飲める量</span>
    <span class="r-val" id="remainVal">140<small style="font-size:.7rem;font-family:sans-serif"> g</small></span>
  </div>
</div>

<div class="kyukan-wrap">
  <h2>休肝日（7日間で2日目標）</h2>
  <div class="cal-grid" id="calGrid"></div>
  <div class="kyukan-status">
    <span class="ks-label" id="kyukanStatus">あと必要な休肝日</span>
    <span class="ks-val" id="kyukanVal">—</span>
  </div>
</div>

<div class="card">
  <h2>今飲むお酒を記録</h2>
  <div class="presets">
    <button class="preset-btn" onclick="applyPreset(350,5)">ビール350ml 5%</button>
    <button class="preset-btn" onclick="applyPreset(500,5)">ビール500ml 5%</button>
    <button class="preset-btn" onclick="applyPreset(180,15)">日本酒1合 15%</button>
    <button class="preset-btn" onclick="applyPreset(150,12)">ワイン150ml 12%</button>
    <button class="preset-btn" onclick="applyPreset(350,9)">ストロング350ml 9%</button>
  </div>
  <div class="row">
    <div class="field"><label>量 (ml)</label><input type="number" id="mlInput" placeholder="350" oninput="updateCalc()"></div>
    <div class="field"><label>度数 (%)</label><input type="number" id="pctInput" placeholder="5" step="0.1" oninput="updateCalc()"></div>
  </div>
  <div class="calc-result" id="calcResult">量と度数を入力してください</div>
  <button class="btn-add" onclick="addDrink()">＋ 記録する</button>
</div>

<div class="card">
  <h2>今回の記録</h2>
  <div class="history-list" id="histList"></div>
</div>

<div class="matrix-wrap">
  <h2>1日の目安量</h2>
  <table class="matrix-table">
    <thead><tr><th>種類</th><th>平均20g</th><th>MAX40g</th></tr></thead>
    <tbody>
      <tr><td class="drink-label"><strong>ストロング</strong>9%</td><td>278ml</td><td>556ml</td></tr>
      <tr><td class="drink-label"><strong>焼酎</strong>25%</td><td>100ml</td><td>200ml</td></tr>
    </tbody>
  </table>
</div>

<button class="btn-reset" onclick="resetWeek()">🔄 今から1週間を開始</button>

<script>
const MAX = 140;
const KYUKAN_TARGET = 2;
const STORE_KEY = 'sake_tracker_dynamic_v1';
const DOW_LABELS = ['月','火','水','木','金','土','日'];

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}

function saveData(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

function getStartDate() {
  const data = loadData();
  if (!data.start_date) {
    data.start_date = toDateStr(new Date());
    saveData(data);
  }
  return new Date(data.start_date);
}

function toggleKyukan(ds) {
  const data = loadData();
  data.kyukan = data.kyukan || [];
  const idx = data.kyukan.indexOf(ds);
  if (idx >= 0) data.kyukan.splice(idx, 1); else data.kyukan.push(ds);
  saveData(data); render();
}

function updateCalc() {
  const ml = parseFloat(document.getElementById('mlInput').value);
  const pct = parseFloat(document.getElementById('pctInput').value);
  const el = document.getElementById('calcResult');
  if (ml > 0 && pct >= 0) {
    const g = (ml * pct / 100 * 0.8).toFixed(1);
    el.innerHTML = `純アルコール量：<span class="val">${g}</span>g`;
  } else { el.innerHTML = '量と度数を入力してください'; }
}

function applyPreset(ml, pct) {
  document.getElementById('mlInput').value = ml;
  document.getElementById('pctInput').value = pct;
  updateCalc();
}

function addDrink() {
  const ml = parseFloat(document.getElementById('mlInput').value);
  const pct = parseFloat(document.getElementById('pctInput').value);
  if (!(ml > 0 && pct >= 0)) return;
  const data = loadData();
  data.records = data.records || [];
  data.records.push({ ml, pct, g: ml * pct / 100 * 0.8, ts: Date.now() });
  saveData(data);
  document.getElementById('mlInput').value = '';
  document.getElementById('pctInput').value = '';
  render();
}

function deleteDrink(idx) {
  const data = loadData();
  data.records.splice(idx, 1);
  saveData(data); render();
}

function resetWeek() {
  if (!confirm('今から新しい1週間を開始しますか？（これまでの記録は消去されます）')) return;
  const data = { start_date: toDateStr(new Date()), records: [], kyukan: [] };
  saveData(data); render();
}

function render() {
  const data = loadData();
  const startDate = getStartDate();
  const records = data.records || [];
  const kyukanDays = data.kyukan || [];
  const total = records.reduce((s, r) => s + r.g, 0);
  const remain = MAX - total;
  const todayStr = toDateStr(new Date());

  // 表示更新
  document.getElementById('totalVal').innerHTML = `${total.toFixed(1)}<span>g</span>`;
  const pct = Math.min(total / MAX * 100, 100);
  const fill = document.getElementById('barFill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (pct >= 100 ? ' over' : pct >= 70 ? ' warning' : '');

  const rv = document.getElementById('remainVal');
  rv.innerHTML = remain > 0 ? `${remain.toFixed(1)}<small> g</small>` : `超過 ${Math.abs(remain).toFixed(1)}g`;
  rv.className = 'r-val' + (remain <= 0 ? ' over' : remain < 40 ? ' warning' : '');
  document.getElementById('banner').className = 'banner' + (total > MAX ? ' show' : '');

  const endDate = new Date(startDate); endDate.setDate(startDate.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent = `${fmt(startDate)} 〜 ${fmt(endDate)}`;

  // カレンダー生成
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(startDate); d.setDate(startDate.getDate() + i);
    const ds = toDateStr(d);
    const isKyukan = kyukanDays.includes(ds);
    const isToday = ds === todayStr;
    const isFuture = d > new Date() && !isToday;
    const dayLabel = DOW_LABELS[(d.getDay() + 6) % 7];
    const dowClass = d.getDay() === 0 ? 'sun' : d.getDay() === 6 ? 'sat' : '';
    grid.innerHTML += `
      <div class="cal-day">
        <span class="dow ${dowClass}">${dayLabel}</span>
        <button class="day-btn ${isKyukan?'kyukan':''} ${isToday?'today':''} ${isFuture?'future':''}" onclick="toggleKyukan('${ds}')">${d.getDate()}</button>
      </div>`;
  }

  const done = kyukanDays.length;
  const need = Math.max(0, KYUKAN_TARGET - done);
  const ksVal = document.getElementById('kyukanVal');
  ksVal.innerHTML = need === 0 ? '達成！' : `あと <span>${need}</span> 日`;
  ksVal.style.color = need === 0 ? 'var(--safe)' : 'var(--accent)';

  const list = document.getElementById('histList');
  list.innerHTML = records.length ? records.map((r, i) => `
    <div class="hist-item">
      <span>${r.ml}ml(${r.pct}%)</span>
      <div><span class="hist-g">${r.g.toFixed(1)}g</span><button class="hist-del" onclick="deleteDrink(${i})">✕</button></div>
    </div>`).reverse().join('') : '<p style="text-align:center;color:var(--muted);padding:10px;">記録なし</p>';
}

render();
</script>
</body>
</html>
