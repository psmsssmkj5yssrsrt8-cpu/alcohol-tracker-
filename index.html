    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;

    transition: width .6s cubic-bezier(.4,0,.2,1), background .4s;
    min-width: 0;
  }

    transition: color .4s;
  }
  .remaining-badge .r-val.warning { color: var(--accent); }
  .remaining-badge .r-val.over    { color: var(--danger); }

    color: var(--muted);
    margin-bottom: 16px;
